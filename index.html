<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Coding - 跨裝置互動控制</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; 
            
            /* 【關鍵修復】防止手機滑動時觸發瀏覽器的返回上一頁、下拉更新或滾動 */
            touch-action: none; 
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: fill; 
            pointer-events: none; 
        }

        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            pointer-events: none;
            mix-blend-mode: difference; 
            text-align: center;
        }
    </style>
</head>
<body>

    <video id="bg-video" muted playsinline>
        <source src="spin.mp4" type="video/mp4">
    </video>

    <div class="overlay-text">
        <span id="instruction">左右滑動</span>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        
        // 分別記錄滑鼠與觸控的最後 X 座標
        let lastMouseX = null;
        let lastTouchX = null;
        
        const FPS = 30; 
        const frameDuration = 1 / FPS; 

        // 確保影片加載完成且暫停在第一幀
        video.addEventListener('loadedmetadata', () => {
            video.pause();
        });

        // 建立一個共用的函數來更新影片時間
        // 傳入需要移動的「幀數」
        function updateVideoTime(framesToMove) {
            if (Number.isNaN(video.duration)) return;
            
            const timeToMove = framesToMove * frameDuration;
            let newTime = video.currentTime + timeToMove;
            
            // 確保時間不會超出影片範圍
            newTime = Math.max(0, Math.min(newTime, video.duration));
            video.currentTime = newTime;
        }

        // ==========================================
        // 桌機版邏輯：滑鼠移動 (10px = 1 Frame)
        // ==========================================
        window.addEventListener('mousemove', (e) => {
            if (lastMouseX === null) {
                lastMouseX = e.clientX;
                return;
            }

            const deltaX = e.clientX - lastMouseX;
            lastMouseX = e.clientX;

            const framesToMove = deltaX / 10;
            updateVideoTime(framesToMove);
        });

        // 滑鼠離開視窗再回來時，重置座標避免影片暴衝
        window.addEventListener('mouseenter', (e) => {
            lastMouseX = e.clientX;
        });


        // ==========================================
        // 手機版邏輯：觸控滑動 (5px = 1 Frame)
        // ==========================================
        
        // 當手指碰到螢幕的瞬間，記錄起始點
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                lastTouchX = e.touches[0].clientX;
            }
        }, { passive: false });

        // 當手指在螢幕上滑動時
        window.addEventListener('touchmove', (e) => {
            // 阻擋預設的滑動行為（避免畫面被拉扯）
            e.preventDefault(); 

            if (e.touches.length > 0) {
                const currentTouchX = e.touches[0].clientX;
                
                if (lastTouchX === null) {
                    lastTouchX = currentTouchX;
                    return;
                }

                const deltaX = currentTouchX - lastTouchX;
                lastTouchX = currentTouchX;

                // 手機靈敏度加倍：5px = 1 Frame
                const framesToMove = deltaX / 5; 
                updateVideoTime(framesToMove);
            }
        }, { passive: false });
    </script>
</body>
</html>
