<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>test</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; 
            touch-action: none; 
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: fill; 
            pointer-events: none; 
        }

        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            pointer-events: none;
            mix-blend-mode: difference; 
            text-align: center;
        }
    </style>
</head>
<body>

    <video id="bg-video" muted playsinline preload="auto">
        <source src="spin.mp4" type="video/mp4">
    </video>

    <div class="overlay-text">
        <span id="instruction">👈 👉</span>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        
        let lastMouseX = null;
        let lastTouchX = null;
        let videoUnlocked = false; 
        
        const FPS = 30; 
        const frameDuration = 1 / FPS; 
        
        // 【核心修正】建立一個獨立變數來追蹤時間，避免瀏覽器吃掉小數點
        let virtualTime = 2; 

        video.addEventListener('loadedmetadata', () => {
            video.pause();
            video.currentTime = virtualTime; // 初始設定為 2 秒
        });

        function updateVideoTime(framesToMove) {
            if (Number.isNaN(video.duration)) return;
            
            const timeToMove = framesToMove * frameDuration;
            
            // 使用 virtualTime 累加，不再依賴讀取 video.currentTime
            virtualTime = virtualTime + timeToMove;
            
            // 確保時間不會超出範圍
            virtualTime = Math.max(0, Math.min(virtualTime, video.duration));
            
            // 將算好的精確時間賦值給影片
            video.currentTime = virtualTime;
        }

        // ==========================================
        // 桌機版邏輯
        // ==========================================
        window.addEventListener('mousemove', (e) => {
            if (lastMouseX === null) {
                lastMouseX = e.clientX;
                return;
            }

            const deltaX = e.clientX - lastMouseX;
            lastMouseX = e.clientX;

            const framesToMove = deltaX / 10;
            updateVideoTime(framesToMove);
        });

        window.addEventListener('mouseenter', (e) => {
            lastMouseX = e.clientX;
        });

        // ==========================================
        // 手機版邏輯
        // ==========================================
        window.addEventListener('touchstart', (e) => {
            if (!videoUnlocked) {
                video.play().then(() => {
                    video.pause();
                    videoUnlocked = true;
                }).catch(err => console.log("影片解鎖失敗：", err));
            }

            if (e.touches.length > 0) {
                lastTouchX = e.touches[0].clientX;
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 

            if (e.touches.length > 0) {
                const currentTouchX = e.touches[0].clientX;
                
                if (lastTouchX === null) {
                    lastTouchX = currentTouchX;
                    return;
                }

                const deltaX = currentTouchX - lastTouchX;
                lastTouchX = currentTouchX;

                const framesToMove = deltaX / 5; 
                updateVideoTime(framesToMove);
            }
        }, { passive: false });
    </script>
</body>
</html>
